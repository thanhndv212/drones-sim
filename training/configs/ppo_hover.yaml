# PPO hover training configuration
env:
  dt: 0.01
  episode_len_s: 10.0
  target: [0.0, 0.0, 2.0]
  reward:
    w_pos: 1.0
    w_vel: 0.05
    w_attitude: 0.1
    w_action: 0.01
    w_action_d: 0.005
    w_alive: 0.1
    w_reach: 10.0
    w_crash: -10.0
    reach_radius: 0.1

ppo:
  policy: MlpPolicy
  learning_rate: 3.0e-4
  n_steps: 1024
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  policy_kwargs:
    net_arch: [128, 128]
  save_freq: 10000
  tensorboard_log: ./tb/ppo_hover
